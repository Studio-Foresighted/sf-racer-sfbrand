<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,">
    <title>Artworx Kart</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        /* Disable Zoom & Context Menu */
        * {
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none; /* Safari */
            -khtml-user-select: none; /* Konqueror HTML */
            -moz-user-select: none; /* Old Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
            user-select: none; /* Non-prefixed version, currently supported by Chrome, Edge, Opera and Firefox */
            touch-action: none; /* Disable browser handling of gestures */
        }
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        body.font-italic { font-style: italic; }
        
        /* --- HUD LAYOUT --- */
        #hud-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let touches pass through to controls */
            display: none; /* Hidden until game starts */
        }

        /* Top Left: Rank, Time, Lap, Map */
        #hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .rank-text {
            font-size: 32px; /* half size */
            font-weight: 900;
            line-height: 1;
            color: #ffd700; /* Gold */
            text-shadow: 2px 2px 0px #000; /* Drop shadow like speed */
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* Gift Button (Replaces Coin Icon) */
        #gift-btn {
            position: relative; /* Relative to flex container */
            width: 40px; /* Match previous coin icon size approx */
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            pointer-events: auto; /* Ensure clickable */
            display: block; /* Always visible */
            font-style: normal;
            z-index: 100;
        }
        /* Default State (No Milestones) */
        #gift-btn.state-0 { background-image: url('./assets/ui/giftbox-0.png'); }
        /* Active State (Milestones Hit) */
        #gift-btn.state-1 { background-image: url('./assets/ui/giftbox-1.png'); }

        #gift-notification {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff3333;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 1px solid white;
        }

        .rank-suffix { font-size: 24px; vertical-align: top; }
        .hud-row { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; text-shadow: 1px 1px 0 #000; }
        .hud-label { color: #ccc; font-size: 14px; }
        
        /* minimap removed */

        /* Top Right: Speed, Boost, Fuel */
        #hud-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            max-width: 45vw; /* Constraint for mobile */
        }
        /* Container for Speed Text + Unit to prevent wrapping */
        .speed-container {
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
        }
        .speed-text {
            font-size: 64px;
            font-weight: 900;
            font-style: italic;
            line-height: 1;
            text-shadow: 2px 2px 0px #000;
        }
        .speed-unit { font-size: 24px; font-weight: 700; color: #666; }
        
        .bar-container {
            width: 45vw; /* Responsive, just under 50% */
            max-width: 300px; /* Cap max width */
            height: 12px;
            background: rgba(0,0,0,0.5);
            transform: skewX(-20deg);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }

        /* Landscape Mobile Adjustments */
        @media (orientation: landscape) {
            .bar-container {
                width: 30vw; /* Smaller on landscape mobile */
                max-width: 200px;
            }
            .speed-text { font-size: 48px; }
            
            /* Tighter Steering Buttons */
            .steer-btn {
                width: 7vw !important; height: 7vw !important;
                bottom: 10px;
            }
            #btn-left { left: 20px !important; }
            #btn-right { left: calc(20px + 7vw + 20px) !important; } /* 20px gap */

            /* Tighter Action Buttons */
            .action-btn {
                width: 8vw !important; height: 8vw !important;
                bottom: 10px;
            }
            #btn-accelerate { right: 20px !important; }
            #btn-brake { right: calc(20px + 8vw + 20px) !important; } /* 20px gap */
        }

        /* Shake Animation */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }
        .shake {
            animation: shake 0.5s ease-in-out infinite;
        }
        
        /* Grey Badge for Viewed */
        #gift-notification.badge-grey {
            background: #666;
            border-color: #999;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        #speed-bar .bar-fill { background: linear-gradient(90deg, #00ccff, #ff00cc); }
        #fuel-bar .bar-fill { background: linear-gradient(90deg, #ffcc00, #ff3300); }
        
        .boost-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 1px 1px 0 #000;
        }
        .boost-icon { font-size: 20px; }

        /* Controls Layer */
        #controls-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to HUD/Game */
            touch-action: none;
            display: none; /* Hidden until game starts */
        }

        /* Steering Buttons (Left/Right) */
        .steer-btn {
            pointer-events: auto; /* Re-enable clicks for buttons */
            position: absolute;
            bottom: 2vh;
            width: 18vw;
            height: 18vw;
            max-width: 100px;
            max-height: 100px;
            min-width: 60px;
            min-height: 60px;
            
            /* Circle with black opacity */
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            
            /* Arrow Image */
            background-image: url('./assets/ui/inner-arrow.png');
            background-size: 50%; /* Padding effect */
            background-repeat: no-repeat;
            background-position: center;
            
            border: none;
            
            color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0;
            cursor: pointer;
            user-select: none;
            font-style: normal!important;
            -webkit-tap-highlight-color: transparent;
            z-index: 100;
        }
        .steer-btn:active, .steer-btn.active { 
            transform: scale(0.90); /* Press effect only, rotation handled in ID */
        }
        
        /* 
           Image is DOWN by default.
           Rotate 90deg -> Left
           Rotate -90deg -> Right
        */
        #btn-left { 
            left: 4vw; 
            transform: rotate(90deg);
        }
        #btn-left:active, #btn-left.active {
            transform: rotate(90deg) scale(0.9);
        }

        #btn-right { 
            left: 26vw; 
            transform: rotate(-90deg);
        }
        #btn-right:active, #btn-right.active {
            transform: rotate(-90deg) scale(0.9);
        }

        /* Action Buttons (Gas/Brake) */
        .action-btn {
            pointer-events: auto; /* Re-enable clicks */
            position: absolute;
            bottom: 2vh;
            
            /* Responsive Size */
            width: 20vw;
            height: 20vw;
            max-width: 110px;
            max-height: 110px;
            min-width: 70px;
            min-height: 70px;

            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; /* Keep rounded rect or make circle? User said "same button" */
            
            /* Arrow Image */
            background-image: url('./assets/ui/inner-arrow.png');
            background-size: 50%;
            background-repeat: no-repeat;
            background-position: center;

            color: transparent; /* Hide text */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0;
            cursor: pointer;
            user-select: none;
            z-index: 100;
        }
        .action-btn:active, .action-btn.active { 
            border-color: white;
        }

        /* Gas: Green, Bottom Right, Arrow UP */
        #btn-accelerate { 
            right: 4vw; 
            background-color: rgba(0, 200, 0, 0.3);
            transform: rotate(180deg); /* Down -> Up */
        }
        #btn-accelerate:active, #btn-accelerate.active {
            background-color: rgba(0, 200, 0, 0.5);
            transform: rotate(180deg) scale(0.95);
        }

        /* Brake: Red, Left of Gas, Arrow DOWN */
        #btn-brake { 
            right: 28vw; /* 4vw + 20vw + 4vw gap */
            
            /* Make slightly smaller? */
            width: 16vw;
            height: 16vw;
            max-width: 90px;
            max-height: 90px;
            min-width: 60px;
            min-height: 60px;
            
            background-color: rgba(200, 0, 0, 0.3);
            transform: rotate(0deg); /* Down -> Down */
        }
        #btn-brake:active, #btn-brake.active {
            background-color: rgba(200, 0, 0, 0.5);
            transform: scale(0.95);
        }

        /* N20: Adjusted position */
        #btn-nitro { 
            bottom: 28vh; 
            right: 4vw; 
            width: 50px; 
            height: 50px; 
            background: rgba(0, 100, 255, 0.3); 
        }

        /* Nitro Bars: Located under N20 button (between Brk and N20) */
        #nitro-bars {
            position: absolute;
            bottom: 205px; /* Just below N20 (220) */
            right: 50px;
            width: 50px; /* Match button width */
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .nitro-bar {
            width: 30%;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            transform: skewX(-20deg);
        }
        .nitro-bar.active {
            background: #00ccff;
            box-shadow: 0 0 8px #00ccff;
            border-color: #fff;
        }

        /* Hide fuel / N20 meter and N20 controls for now */
        #fuel-bar { display: none !important; }
        #btn-nitro { display: none !important; }
        #nitro-bars { display: none !important; }

        /* Mobile Menu Button (Quarter Circle) */
        #mobile-menu-btn {
            position: absolute;
            top: 0;
            right: 0;
            width: 52px; /* Half size (was 80) */
            height: 52px; /* Half size (was 80) */
            background: rgba(0, 123, 255, 0.5); /* Blue */
            border-bottom-left-radius: 100%;
            cursor: pointer;
            z-index: 2000;
            display: none; /* Hidden on desktop by default, shown via JS if touch */
            pointer-events: auto; /* Re-enable clicks */
            transition: all 0.2s ease;
        }
        #mobile-menu-btn.menu-open {
            width: 78px; /* +50% */
            height: 78px; /* +50% */
            background: rgba(220, 53, 69, 0.8); /* Red for close */
        }
        #mobile-menu-btn span {
            position: absolute;
            top: 14px; /* Adjusted for smaller size */
            right: 5px; /* Adjusted for smaller size */
            color: white;
            font-size: 13px; /* Larger as requested */
            font-weight: bold;
            transform: rotate(45deg);
            transition: all 0.2s ease;
        }
        #mobile-menu-btn.menu-open span {
            top: 22px;
            right: 18px;
            font-size: 24px;
            transform: rotate(0deg);
        }

        #garage-ui {
            position: absolute;
            top: 112px; /* nudged up 2px to sit just below timer */
            left: 20px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border: 2px solid #444;
            border-radius: 8px;
            color: white;
            display: none; /* Hidden until loaded */
            min-width: 240px;
            z-index: 2500; /* Below loading overlay (3000) */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        #garage-ui.collapsed {
            background: rgba(20, 20, 20, 0.4);
            padding: 4px 10px;
            border-color: rgba(255,255,255,0.1);
            box-shadow: none;
            min-width: 150px; /* Smaller width */
        }
        #garage-ui.collapsed h3 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        /* Ensure coin icon and jump crowns are not italicized by global UI font setting */
        .coin-icon { font-style: normal; }
        .jump-entry span:first-child { font-style: normal; }
        .car-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            background: #333;
            border: 1px solid #555;
            color: white;
            cursor: pointer;
            text-align: left;
        }
        .car-btn:hover { background: #444; }
        .car-btn.active { background: #007bff; border-color: #0056b3; }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loading-content {
            text-align: center;
            width: 300px;
        }
        .loading-content h1 {
            margin-bottom: 20px;
            font-style: italic;
            letter-spacing: 2px;
            color: #ff3333;
        }
        .progress-container {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #ff3333,
                #ff3333 10px,
                #cc0000 10px,
                #cc0000 20px
            );
            background-size: 28px 28px;
            animation: moveStripe 1s linear infinite;
            transition: width 0.2s ease-out;
        }
        @keyframes moveStripe {
            0% { background-position: 0 0; }
            100% { background-position: 28px 0; }
        }
        #loading-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        #gimmick-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            font-style: italic;
            min-height: 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Value styling inside gimmick lines (e.g. after colon) */
        #gimmick-text .gimmick-value {
            color: #ffffff;
            font-weight: 400;
            margin-left: 6px;
        }
        /* Old Gift Button Removed */

        /* Milestone Modal */
        #milestone-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 6000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .milestone-content {
            width: 80%;
            max-width: 500px;
            background: #111;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px;
            max-height: 80%;
            overflow-y: hidden; /* Scroll handled by list */
            display: flex;
            flex-direction: column;
        }
        #milestone-list {
            overflow-y: auto;
            max-height: 450px; /* Approx 6 items */
            padding-right: 5px;
        }
        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .milestone-title { font-size: 24px; color: #ffd700; font-weight: 900; }
        .milestone-close {
            background: #333;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Desktop Adjustments */
        @media (min-width: 1024px) and (hover: hover) {
            /* Hide mobile controls */
            #btn-left, #btn-right, #btn-accelerate, #btn-brake {
                display: none !important;
            }

            /* Scale Top-Left HUD */
            #hud-top-left {
                transform: scale(2);
                transform-origin: top left;
            }

            /* Move Garage UI down to avoid overlap with scaled HUD */
            #garage-ui {
                top: 220px !important;
            }
        }

        /* Loading Banner Styles */
        .loading-banner {
            width: 100%;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        @media (min-width: 1024px) {
            .loading-banner {
                width: auto;
                max-width: 90%; /* Wider on desktop (was 80%) */
            }
        }
    </style>
</head>
<body class="font-italic">
    <div id="loading-overlay">
        <div class="loading-content">
            <img src="./assets/ui/artworx-kart-banner.png" alt="Artworx Kart" class="loading-banner">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="loading-text">Initializing...</div>
            <div id="gimmick-text"></div>
        </div>
    </div>

    <div id="milestone-modal">
        <div class="milestone-content">
            <div class="milestone-header">
                <div class="milestone-title">MILESTONES</div>
                <button class="milestone-close" id="milestone-close">X</button>
            </div>
            <div id="milestone-list"></div>
        </div>
    </div>

    <!-- HUD Layer -->
    <div id="hud-layer">
        <div id="hud-top-left">
            <div class="rank-text">
                <div id="gift-btn" class="state-0">
                    <div id="gift-notification" style="display: none;">0</div>
                </div>
                <span id="coin-count">0</span>
            </div>
            <div class="hud-row">
                <span id="lap-display">LAP 1/3</span>
            </div>
            <div class="hud-row">
                    <span id="time-display">00' 00" 00</span>
                </div>
        </div>

        <div id="hud-top-right">
            <div class="speed-container">
                <span class="speed-text" id="speed-display">0</span>
                <span class="speed-unit">KM/H</span>
            </div>
            <div class="bar-container" id="speed-bar">
                <div class="bar-fill" style="width: 0%"></div>
            </div>
            
            <div class="bar-container" id="fuel-bar">
                <div class="bar-fill" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div id="garage-ui" style="margin-top:5px;">
        <h3 id="garage-header" style="margin:0; font-size:16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
            Select Car <span id="garage-toggle-icon">▼</span>
        </h3>
        <div id="car-list" style="max-height: 200px; overflow-y: auto; transition: max-height 0.3s ease;"></div>
    </div>
        
        <!-- Controls Layer -->
    <div id="controls-layer">
        <div id="mobile-menu-btn"><span>Menu</span></div>
        
        <div id="btn-left" class="steer-btn"></div>
        <div id="btn-right" class="steer-btn"></div>
        
        <div id="btn-accelerate" class="action-btn">Gas</div>
        <div id="btn-brake" class="action-btn">Rev</div>
        <div id="btn-nitro" class="action-btn">N20</div>
        
        <!-- Gift Button moved to HUD -->

        <div id="nitro-bars">
            <div class="nitro-bar"></div>
            <div class="nitro-bar"></div>
            <div class="nitro-bar"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@dimforge/rapier3d-compat": "https://unpkg.com/@dimforge/rapier3d-compat@0.14.0/rapier.es.js"
            }
        }
    </script>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
